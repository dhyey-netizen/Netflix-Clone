<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>
   Netflix Clone
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
 </head>
 <body class="bg-black text-white">
  <header class="flex justify-between items-center p-4">
   <div class="text-red-600 text-3xl font-bold">
    NETFLIX
   </div>
   <div class="flex items-center space-x-4">
    <div class="text-white flex items-center space-x-1">
     <span>
      English
     </span>
     <i class="fas fa-caret-down">
     </i>
    </div>
    <button class="bg-white text-black px-4 py-1 rounded">
     Sign In
    </button>
   </div>
  </header>
  <main class="relative">
   <div class="relative w-full h-96">
    <img alt="Background image with various movie posters" class="w-full h-full object-cover" src="https://placehold.co/1200x500"/>
    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black opacity-75">
    </div>
    <div class="absolute inset-0 flex flex-col justify-center items-center text-center px-4">
     <div class="bg-black bg-opacity-75 p-6 rounded-lg border border-gray-700">
      <h1 class="text-4xl md:text-6xl font-bold mb-4">
       Unlimited movies, TV shows and more
      </h1>
      <p class="text-lg md:text-2xl mb-4">
       Starts at ₹149. Cancel at any time.
      </p>
      <p class="text-sm md:text-lg mb-6">
       Ready to watch? Enter your email to create or restart your membership.
      </p>
      <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-4 w-full max-w-md">
       <input class="w-full md:w-auto flex-grow px-4 py-2 rounded bg-white text-black border border-gray-400" placeholder="Email address" type="email"/>
       <button class="bg-red-600 text-white px-6 py-2 rounded">
        Get Started
       </button>
      </div>
     </div>
    </div>
   </div>
   <div class="flex justify-center mt-8">
    <div class="bg-gray-800 p-6 rounded-lg border border-gray-700 w-full max-w-2xl">
     <h2 class="text-2xl font-bold mb-4">
      Upload Your Images
     </h2>
     <form action="#" enctype="multipart/form-data" method="POST">
      <div class="mb-4">
       <label class="block text-sm font-medium text-gray-300" for="file_input">
        Select image to upload:
       </label>
       <input class="mt-1 block w-full text-sm text-gray-900 bg-gray-50 rounded-lg border border-gray-300 cursor-pointer focus:outline-none" id="file_input" name="file_input" type="file"/>
      </div>
      <button class="bg-red-600 text-white px-6 py-2 rounded" type="submit">
       Upload
      </button>
     </form>
    </div>
   </div>
  </main>
 </body>
</html>
