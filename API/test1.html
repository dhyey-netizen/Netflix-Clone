<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMDB Movies by Genre</title>
</head>
<body>
  <h1>Movies by Genre</h1>
  <ul id="movie-list" style="list-style-type: none; padding: 0;"></ul>

  <script>
    const urlMovies = 'https://imdb8.p.rapidapi.com/title/v2/get-chart-genre-teaser-posters?titleType=ALL&first=20&genre1=Comedy&genre2=Horror&genre3=Sci-Fi&country=US&language=en-US';

    const options = {
      method: 'GET',
      headers: {
        'x-rapidapi-key': '569ec41766msh8eb7b3ad0a35c71p1922c3jsne2ba62ff6646',
        'x-rapidapi-host': 'imdb8.p.rapidapi.com'
      }
    };

    async function fetchMovies() {
      try {
        const response = await fetch(urlMovies, options);
        const result = await response.json();

        console.log("Movies Response:", result);

        const movieList = document.getElementById("movie-list");
        movieList.innerHTML = '';

        if (result && result.data) {
          const genreNames = {
            genre1: "Comedy",
            genre2: "Horror",
            genre3: "Sci-Fi"
          };

          Object.keys(genreNames).forEach(genreKey => {
            const genreData = result.data[genreKey];
            console.log(`Data for ${genreKey}:`, genreData);

            if (genreData && Array.isArray(genreData.edges) && genreData.edges.length > 0) {
              const genreTitle = document.createElement("h2");
              genreTitle.textContent = genreNames[genreKey];
              movieList.appendChild(genreTitle);

              genreData.edges.forEach(edge => {
                const li = document.createElement("li");
                li.style.marginBottom = "20px";

                const title = edge.node?.titleText?.text || "Untitled Movie";
                const imageUrl = edge.node?.primaryImage?.url;

                const titleElement = document.createElement("p");
                titleElement.textContent = title;
                titleElement.style.fontWeight = "bold";
                li.appendChild(titleElement);

                if (imageUrl) {
                  const img = document.createElement("img");
                  img.src = imageUrl;
                  img.alt = title;
                  img.style.width = "150px";
                  img.style.borderRadius = "8px";
                  img.style.boxShadow = "0 4px 8px rgba(0, 0, 0, 0.2)";
                  li.appendChild(img);
                }

                movieList.appendChild(li);
              });
            } else {
              console.warn(`No movies found for ${genreNames[genreKey]}`);
            }
          });
        } else {
          console.error("Unexpected result format:", result);
        }
      } catch (error) {
        console.error("Error fetching movies:", error);
      }
    }

    fetchMovies();
  </script>
</body>
</html>
