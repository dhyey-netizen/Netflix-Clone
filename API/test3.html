<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netflix Style Movies</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background-color: #141414;
      color: #fff;
    }
    header {
      padding: 20px;
      text-align: center;
      background-color: #111;
      font-size: 32px;
      font-weight: bold;
      color: #e50914;
    }
    .container {
      padding: 20px;
    }
    .row {
      margin-bottom: 40px;
    }
    .row h2 {
      margin-bottom: 15px;
      font-size: 24px;
    }
    .movie-row {
      display: flex;
      overflow-x: auto;
      gap: 15px;
    }
    .movie-card {
      min-width: 160px;
      background-color: #222;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s;
    }
    .movie-card img {
      width: 100%;
      display: block;
    }
    .movie-card:hover {
      transform: scale(1.08);
    }
    .movie-title {
      padding: 10px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>Netflix Inspired</header>
  <div class="container" id="content"></div>

  <script>
    const genres = ['Comedy', 'Horror', 'Sci-Fi', 'Action', 'Drama', 'Romance'];
    const apiKey = '569ec41766msh8eb7b3ad0a35c71p1922c3jsne2ba62ff6646';

    const options = {
      method: 'GET',
      headers: {
        'x-rapidapi-key': apiKey,
        'x-rapidapi-host': 'imdb8.p.rapidapi.com'
      }
    };

    async function fetchGenreMovies(genre) {
      const url = `https://imdb8.p.rapidapi.com/title/v2/get-chart-genre-teaser-posters?titleType=ALL&first=20&genre1=${genre}&country=US&language=en-US`;
      try {
        const res = await fetch(url, options);
        const data = await res.json();
        return data?.data?.genre1?.edges || [];
      } catch (err) {
        console.error(`Error fetching ${genre} movies:`, err);
        return [];
      }
    }

    async function loadMovies() {
      const container = document.getElementById('content');
      for (const genre of genres) {
        const movies = await fetchGenreMovies(genre);
        if (movies.length === 0) continue;

        const row = document.createElement('div');
        row.className = 'row';

        const title = document.createElement('h2');
        title.textContent = genre;
        row.appendChild(title);

        const movieRow = document.createElement('div');
        movieRow.className = 'movie-row';

        movies.forEach(edge => {
          const movieCard = document.createElement('div');
          movieCard.className = 'movie-card';

          const img = document.createElement('img');
          img.src = edge.node?.primaryImage?.url || '';
          img.alt = edge.node?.titleText?.text || 'No Title';

          const caption = document.createElement('div');
          caption.className = 'movie-title';
          caption.textContent = edge.node?.titleText?.text || 'Untitled';

          movieCard.appendChild(img);
          movieCard.appendChild(caption);
          movieRow.appendChild(movieCard);
        });

        row.appendChild(movieRow);
        container.appendChild(row);
      }
    }

    loadMovies();
  </script>
</body>
</html>
