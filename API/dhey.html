<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Netflix Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: url('header-image.png') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1;
    }

    .login-container {
  position: relative;
  z-index: 2;
  background-color: rgba(0, 0, 0, 0.75); /* Slightly transparent */
  padding: 60px 80px;
  width: 100%;
  max-width: 480px;
  color: #fff;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(2px);
  display: flex;
  flex-direction: column;
  gap: 20px;
}


    .login-container h1 {
      margin-bottom: 24px;
      font-size: 32px;
    }

    .login-container input[type="text"],
    .login-container input[type="password"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      background: #333;
      border: none;
      color: white;
      border-radius: 4px;
    }

    .login-container button {
      width: 100%;
      padding: 12px;
      background: #e50914;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    .login-container .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #b3b3b3;
      margin-bottom: 16px;
    }

    .login-container .options input {
      margin-right: 4px;
    }

    .login-container .help {
      text-align: right;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .login-container .signup-now {
      font-size: 14px;
      margin-bottom: 16px;
    }

    .login-container .signup-now a,
    .login-container .help a {
      color: #fff;
      text-decoration: none;
    }

    .login-container .captcha {
      font-size: 12px;
      color: #8c8c8c;
    }

    .netflix-logo {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 3;
      color: red;
      font-size: 32px;
      font-weight: bold;
      font-family: 'Helvetica Neue', sans-serif;
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="netflix-logo">NETFLIX</div>
  <div class="login-container">
    <h1>Sign In</h1>
    <input type="text" placeholder="Email or mobile number" />
    <input type="password" placeholder="Password" />
    <button>Sign In</button>
    <div class="options">
      <label><input type="checkbox" /> Remember me</label>
      <div class="help"><a href="#">Need help?</a></div>
    </div>
    <div class="signup-now">
      New to Netflix? <a href="#">Sign up now.</a>
    </div>
    <div class="captcha">
      This page is protected by Google reCAPTCHA to ensure you're not a bot.
    </div>
  </div>
</body>
</html>
