<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="jquery-3.7.1.min.js"></script>
</head>
<body>
    <div class="background"></div>

    <div class="wrapper">
        <div class="header">
            <div id="logo"><img src="ChatGPT Image Apr 7, 2025, 07_29_44 PM.png" alt="Netflix Logo"></div>
        </div>

        <div class="content">
            <div id="sign-in"><h1> Sign In </h1></div> <br>

            <div id="email-input">
                <input type="email" id="emailIn" required autocomplete="off">
                <div class="placeholder">Email or mobile number</div>
                <div id="alert-required"></div>
            </div> <br>

            <div id="password-input">
                <input type="password" id="passIn" required autocomplete="off">
                <div class="placeholder2">Password</div>
                <div id="alert-pass"></div>
            </div> <br>

            <button class="sign-in-btn">Sign In</button> <br><br>

            <div id="or">OR</div> <br>

            <button class="sign-in-code">Use a sign-in code</button> 
            
            <div id="forgot_passwd"><a>Forgot password?</a></div>

            <div class="check-box">
                <span id="check-box-icon"><i class="fa-regular fa-square"></i> </span>
                <span>  Remember Me </span>
            </div> 

            <br><br>
            <div class="sign-in-div">
                <span>New to Netflix?</span>
                <a href="" id="sign-in-link">Sign up now.</a> <br><br>

                <div id="info">This page is protected by Google reCAPTCHA to ensure you're not a bot.</div>
            </div>

            <a class="learn-more-a">Learn more.</a>
            
            <div id="learn-more"></div>
        </div>
    </div>
</body>
</html>
<script src="login.js"></script>
