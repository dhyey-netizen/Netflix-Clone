<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buffer Page</title>
    <style>
        body {
            background-color: black;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            font-family: Arial, sans-serif;
        }

        /* Loader */
        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid rgba(255, 0, 0, 0.2);
            border-top: 8px solid red;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div>
        <h2>Loading your Netflix Profile...</h2>
        <div class="loader"></div>
    </div>

    <script>
        // Redirect to profile.html after 5 seconds
        setTimeout(() => {
            window.location.href = 'profile.html';
        }, 5000);
    </script>

</body>
</html>
